<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Tsenta</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup">
      <header class="popup-brand">
        <svg class="cosmos-logo" width="28" height="28" viewBox="0 0 24 24" role="img" aria-label="Tsenta" fill="none">
          <circle cx="12" cy="3.73" r="3.2" fill="currentColor"></circle>
          <circle cx="19.16" cy="7.87" r="3.2" fill="currentColor"></circle>
          <circle cx="19.16" cy="16.13" r="3.2" fill="currentColor"></circle>
          <circle cx="12" cy="20.27" r="3.2" fill="currentColor"></circle>
          <circle cx="4.84" cy="16.13" r="3.2" fill="currentColor"></circle>
          <circle cx="4.84" cy="7.87" r="3.2" fill="currentColor"></circle>
        </svg>
        <div>
          <h1>Tsenta</h1>
          <p class="tagline">Job Assistant</p>
        </div>
      </header>

      <section id="status" class="status">
        <p id="auth-state">Checking…</p>
        <p id="health-state"></p>
        <p id="scan-state"></p>
      </section>

      <div id="copilot-alert" class="copilot-alert hidden" role="alert">
        <div class="copilot-alert__body">
          <strong id="copilot-alert-title">Attention</strong>
          <p id="copilot-alert-msg"></p>
        </div>
        <button type="button" id="copilot-alert-dismiss" class="copilot-alert__dismiss">
          Dismiss
        </button>
      </div>

      <form id="login-form" class="form hidden">
        <label>
          Email
          <input id="email" type="email" required autocomplete="username" />
        </label>
        <label>
          Password
          <input
            id="password"
            type="password"
            required
            autocomplete="current-password"
          />
        </label>
        <label>
          API Base URL
          <input id="api-base" type="url" placeholder="http://localhost:4000" />
        </label>
        <button type="submit">Sign in</button>
        <p class="hint">
          Already signed in on the Tsenta dashboard? Keep that tab open — your
          session syncs here automatically.
        </p>
        <p id="form-error" class="error"></p>
      </form>

      <section id="authed" class="authed hidden">
        <form id="prefs-form" class="prefs">
          <label>
            Titles (comma-separated)
            <input id="pref-titles" type="text" placeholder="Software Engineer" />
          </label>
          <label>
            Keywords
            <input id="pref-keywords" type="text" placeholder="React, Node" />
          </label>
          <label>
            Locations
            <input id="pref-locations" type="text" placeholder="Bengaluru, Remote" />
          </label>
          <div class="row">
            <label>
              Exp min
              <input id="pref-exp-min" type="number" min="0" max="50" value="0" />
            </label>
            <label>
              Exp max
              <input id="pref-exp-max" type="number" min="0" max="50" value="30" />
            </label>
          </div>
          <label>
            Min salary (LPA)
            <input id="pref-salary" type="number" min="0" max="500" step="0.5" />
          </label>
          <label>
            Work mode
            <select id="pref-work-mode">
              <option value="any">Any</option>
              <option value="office">Office</option>
              <option value="hybrid">Hybrid</option>
              <option value="remote">Remote</option>
            </select>
          </label>
          <label class="check">
            <input id="pref-auto-scan" type="checkbox" checked />
            Auto-scan
          </label>
          <label class="check">
            <input id="pref-auto-apply" type="checkbox" />
            Auto-apply Easy Apply
          </label>
          <label>
            Daily apply limit
            <input id="pref-daily-limit" type="number" min="1" max="100" value="10" />
          </label>
          <button type="submit">Save preferences</button>
          <p id="prefs-msg" class="hint"></p>
        </form>

        <button id="scan-now" type="button">Scan now</button>
        <button id="sync-now" type="button" class="secondary">Sync now</button>
        <button id="logout" type="button" class="secondary">Sign out</button>
      </section>
    </main>
    <script type="module" src="popup.js"></script>
  </body>
</html>
