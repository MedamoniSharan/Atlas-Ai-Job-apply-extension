<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Atlas</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup">
      <header>
        <h1>Atlas</h1>
        <p class="tagline">Job Assistant</p>
      </header>

      <section id="status" class="status">
        <p id="auth-state">Checking…</p>
        <p id="health-state"></p>
        <p id="scan-state"></p>
      </section>

      <form id="login-form" class="form hidden">
        <label>
          Email
          <input id="email" type="email" required autocomplete="username" />
        </label>
        <label>
          Password
          <input
            id="password"
            type="password"
            required
            autocomplete="current-password"
          />
        </label>
        <label>
          API Base URL
          <input id="api-base" type="url" placeholder="http://localhost:4000" />
        </label>
        <button type="submit">Sign in</button>
        <p id="form-error" class="error"></p>
      </form>

      <section id="authed" class="authed hidden">
        <form id="prefs-form" class="prefs">
          <label>
            Titles (comma-separated)
            <input id="pref-titles" type="text" placeholder="Software Engineer" />
          </label>
          <label>
            Keywords
            <input id="pref-keywords" type="text" placeholder="React, Node" />
          </label>
          <label>
            Locations
            <input id="pref-locations" type="text" placeholder="Bengaluru, Remote" />
          </label>
          <div class="row">
            <label>
              Exp min
              <input id="pref-exp-min" type="number" min="0" max="50" value="0" />
            </label>
            <label>
              Exp max
              <input id="pref-exp-max" type="number" min="0" max="50" value="30" />
            </label>
          </div>
          <label>
            Min salary (LPA)
            <input id="pref-salary" type="number" min="0" max="500" step="0.5" />
          </label>
          <label>
            Work mode
            <select id="pref-work-mode">
              <option value="any">Any</option>
              <option value="office">Office</option>
              <option value="hybrid">Hybrid</option>
              <option value="remote">Remote</option>
            </select>
          </label>
          <label class="check">
            <input id="pref-auto-scan" type="checkbox" checked />
            Auto-scan
          </label>
          <label class="check">
            <input id="pref-auto-apply" type="checkbox" />
            Auto-apply Easy Apply
          </label>
          <label>
            Daily apply limit
            <input id="pref-daily-limit" type="number" min="1" max="100" value="10" />
          </label>
          <button type="submit">Save preferences</button>
          <p id="prefs-msg" class="hint"></p>
        </form>

        <button id="scan-now" type="button">Scan now</button>
        <button id="sync-now" type="button" class="secondary">Sync now</button>
        <button id="logout" type="button" class="secondary">Sign out</button>
      </section>
    </main>
    <script type="module" src="popup.js"></script>
  </body>
</html>
